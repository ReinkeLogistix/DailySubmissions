<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Driver Fleet Capture</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-shell">
<header class="app-header stacked-header">
  <img src="logo.png" class="logo" alt="Reinke logo" />
  <h1 class="app-title">Daily Submissions</h1>
</header>

    <main class="phone-frame">
      <section class="card">
        <div class="section-title-row">
          <h2>Driver</h2>
          <button class="small secondary" id="switchDriverBtn" onclick="switchDriver()">Switch Driver</button>
        </div>

        <div id="loginPanel">
          <label for="driverCodeInput">Driver Code</label>
          <input type="text" id="driverCodeInput" placeholder="Enter driver code" />

          <label for="pinInput">PIN</label>
          <input type="password" id="pinInput" placeholder="Enter PIN" />

          <div class="inline-check">
            <input type="checkbox" id="rememberDevice" checked />
            <label for="rememberDevice">Remember this phone</label>
          </div>

          <button onclick="loginDriver()">Continue</button>
        </div>

        <div id="driverInfoPanel" class="hidden">
          <div class="info-chip"><span>Driver</span><strong id="signedInDriver">-</strong></div>
          <div class="info-chip"><span>Active Truck</span><strong id="activeTruckInfo">-</strong></div>
          <div class="info-chip"><span>Mode</span><strong id="modeInfo">Normal Capture</strong></div>
        </div>
      </section>

      <section class="card" id="captureCard">
        <h2>Capture</h2>

        <label for="captureDateInput">Capture Date</label>
        <input type="date" id="captureDateInput" />

        <label for="truckSelect">Truck</label>
        <select id="truckSelect"></select>

        <label for="trailerSelect">Trailer</label>
        <select id="trailerSelect"></select>

        <label for="shiftSelect">Shift</label>
        <select id="shiftSelect"></select>

        <label for="odoInput">Truck ODO</label>
        <input type="number" id="odoInput" inputmode="numeric" placeholder="Enter odometer reading" />

        <label for="trailerHoursInput">Trailer Hours</label>
        <input type="number" id="trailerHoursInput" inputmode="numeric" placeholder="Enter trailer hours if required" />

        <div class="button-stack">
          <button id="saveButton" onclick="saveCapture()">Save Capture</button>
          <button id="closeButton" class="secondary" onclick="startCloseTruck()">Close Truck Session</button>
          <button id="cancelCloseButton" class="warning hidden" onclick="cancelCloseTruck()">Cancel Close-Off</button>
        </div>

        <p id="message" class="message"></p>
      </section>

      <section class="card">
        <h2>Current Month Summary</h2>
        <div class="summary-box">
          <div class="summary-item">
            <span>Month-to-date KMS</span>
            <strong id="monthTotal">0</strong>
          </div>
          <div class="summary-item">
            <span>Month-to-date Truck Sessions</span>
            <strong id="monthSessionCount">0</strong>
          </div>
        </div>

        <div id="monthSessionsList"></div>
      </section>

      <section class="card">
        <h2>Saved Records - Current Month</h2>
        <div id="activeMonthRecords"></div>

        <div class="divider"></div>

        <label for="editRecordSelect">Latest Records</label>
        <select id="editRecordSelect"></select>
        <button class="secondary" onclick="loadSelectedRecordForEdit()">Load Record for Edit</button>

        <div id="editPanel" class="hidden top-gap">
          <div class="info-chip slim">
            <span>Truck</span>
            <strong id="editTruckLabel">-</strong>
          </div>
          <div class="info-chip slim">
            <span>Status</span>
            <strong id="editStatusLabel">-</strong>
          </div>

          <label for="editTrailerSelect">Trailer</label>
          <select id="editTrailerSelect"></select>

          <label for="editShiftSelect">Shift</label>
          <select id="editShiftSelect"></select>

          <label for="editOdoInput">Truck ODO</label>
          <input type="number" id="editOdoInput" inputmode="numeric" />

          <label for="editTrailerHoursInput">Trailer Hours</label>
          <input type="number" id="editTrailerHoursInput" inputmode="numeric" />

          <div class="button-stack">
            <button onclick="saveRecordEdit()">Save Edit</button>
            <button class="secondary" onclick="cancelRecordEdit()">Cancel Edit</button>
          </div>
        </div>
      </section>

      <details class="card">
        <summary>View Previous Months</summary>
        <div class="details-body">
          <label for="historyMonth">Select Month</label>
          <input type="month" id="historyMonth" />

          <button onclick="loadHistoryMonth()">View Month</button>

          <div class="summary-box top-gap">
            <div class="summary-item">
              <span>Total KMS</span>
              <strong id="historyTotalKms">0</strong>
            </div>
            <div class="summary-item">
              <span>Total Sessions</span>
              <strong id="historySessionCount">0</strong>
            </div>
          </div>

          <div id="historySessionsList" class="top-gap"></div>
        </div>
      </details>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
